# Affordance Probing Configuration
# ================================

# Paths
paths:
  umd_dataset: ./data/umd_dataset
  cached_features: ./results/cached_features
  figures: ./results/figures
  tables: ./results/tables
  models_dir: ./models

# Encoder configurations
encoders:
  raw_siglip:
    model_name: google/siglip-so400m-patch14-224
    encoder_type: siglip
    feature_dim: 1152
    fused_feature_dim: 4608  # 1152 * 4 layers
    num_layers: 27
    probe_layers: [6, 13, 20, 26]
    patch_size: 14
    num_patches: 256  # 16x16

  paligemma_siglip:
    model_name: google/paligemma-3b-pt-224
    encoder_type: siglip
    feature_dim: 1152
    fused_feature_dim: 4608
    num_layers: 27
    probe_layers: [6, 13, 20, 26]
    patch_size: 14
    num_patches: 256
    note: Requires HuggingFace gated access

  pi0_siglip:
    source: lerobot/pi0_base
    encoder_type: siglip
    feature_dim: 1152
    fused_feature_dim: 4608
    num_layers: 27
    probe_layers: [6, 13, 20, 26]
    patch_size: 14
    num_patches: 256

  pi05_siglip:
    source: lerobot/pi05_base
    encoder_type: siglip
    feature_dim: 1152
    fused_feature_dim: 4608
    num_layers: 27
    probe_layers: [6, 13, 20, 26]
    patch_size: 14
    num_patches: 256

  dinov2:
    model_name: facebook/dinov2-base
    encoder_type: dinov2
    feature_dim: 768
    fused_feature_dim: 3072  # 768 * 4 layers
    num_layers: 12
    probe_layers: [2, 5, 8, 11]
    patch_size: 14
    num_patches: 256

  dino_wm:
    repo: https://github.com/mazpie/dino-wm
    encoder_type: dinov2
    feature_dim: 768
    fused_feature_dim: 3072
    num_layers: 12
    probe_layers: [2, 5, 8, 11]
    patch_size: 14
    num_patches: 256
    status: deferred

# Image processing
image:
  resolution: 224
  patch_grid: 16  # 224 / 14

# Multi-layer feature fusion (Zhang et al. / Probing3D protocol)
multilayer:
  num_probes: 4
  cache_dtype: float16  # Fused features are 4x larger; cache in half precision

# UMD dataset
umd:
  num_classes: 8  # 7 affordances + background; mIoU reported over 7 (excl. background)
  categories:
    - background     # class 0 — excluded from mIoU
    - grasp          # class 1
    - cut            # class 2
    - scoop          # class 3
    - contain        # class 4
    - pound          # class 5
    - support        # class 6
    - wrap-grasp     # class 7

# Linear probing (following Probe3D protocol)
linear_probe:
  optimizer: adamw
  learning_rate: 1.0e-3
  weight_decay: 0.05
  warmup_fraction: 0.1
  epochs: 50
  batch_size: 32
  num_workers: 4

# PCA analysis
pca:
  n_components: 3

# Depth/normal augmentation
depth_augmentation:
  method: dpt
  dpt_model: Intel/dpt-large
  cache_dir: ./results/cached_features/depth_normal
